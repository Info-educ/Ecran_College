name: Mise à jour météo

on:
  schedule:
    - cron: '*/30 * * * *'   # toutes les 30 minutes
  workflow_dispatch:          # déclenchement manuel possible

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-meteo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Récupérer la météo Open-Meteo
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=48.7953&longitude=2.3097&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&forecast_days=2&timezone=Europe%2FParis" \
            -o meteo.json

      - name: Commit et push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meteo.json
          git diff --cached --quiet || git commit -m "🌤️ Météo mise à jour"
          git push
